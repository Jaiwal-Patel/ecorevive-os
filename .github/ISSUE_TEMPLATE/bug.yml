name: Bug report
description: Report a reproducible defect without personal or sensitive data
body:
  - type: textarea
    attributes:
      label: What happened?
      description: Use synthetic references and remove addresses, phone numbers, credentials and tokens.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    attributes:
      label: Logs or screenshots
      description: Redact personal data and secrets before attaching anything.
